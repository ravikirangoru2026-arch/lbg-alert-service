spring.application.name=lbg-alert-service
# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8081

# ─── DataSource ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:alert_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/callbacks
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-versiom=0
spring.flyway.validate-on-migrate=false

# ─── Connection Pool (HikariCP) ───────────────────────────────────────────────
spring.datasource.hikari.pool-name=HikariPool-Employee
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000


# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.lbg.alert=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.flywaydb=INFO

# ─── SpringDoc / Swagger ─── http://localhost:8081/swagger-ui/index.html
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true

# Packages to scan — point to your controller package
springdoc.packages-to-scan=com.lbg.alert.controller

#Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always